# The stack:
#   db    -- PostgreSQL (official Alpine image, runs as non-root by default)
#   redis -- Rate-limit counter store so limits survive web restarts
#   web   -- Flask + Gunicorn (custom image, runs as the `appuser` user)
#   caddy -- Reverse proxy with optional HTTPS (official Alpine image)
#
# Offline mode: CADDY_DOMAIN=:80, CADDY_AUTO_HTTPS_LINE="auto_https off",
#               BASE_URL=http://<lan-ip> in .env.
# Public mode:  CADDY_DOMAIN=<real hostname>; either automatic Let's Encrypt
#               (host reachable from the internet) or a pre-issued cert via
#               CADDY_TLS_LINE + CERTS_DIR (see Caddyfile for details).

# Pinned so the named volumes keep their identity no matter which directory
# the stack is started from (manual checkout, CI runner workspace, ...).
name: rapporter

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rapporter}
      POSTGRES_USER: ${POSTGRES_USER:-rapporter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rapporter}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-rapporter} -d ${POSTGRES_DB:-rapporter}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal
    # Bound to localhost by default so Postgres is not exposed on the LAN.
    # Set POSTGRES_BIND=0.0.0.0 in .env if external tools need direct access.
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # AOF persistence so rate-limit counters survive restarts; RDB
    # snapshots disabled since the data is transient.
    command: ["redis-server", "--appendonly", "yes", "--save", ""]
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
      DATABASE_URL: postgresql://${POSTGRES_USER:-rapporter}:${POSTGRES_PASSWORD:-rapporter}@db:5432/${POSTGRES_DB:-rapporter}
      REDIS_URL: redis://redis:6379/0
      FLASK_APP: wsgi.py
      FLASK_ENV: ${FLASK_ENV:-production}
      BASE_URL: ${BASE_URL:-http://localhost}
      # When running over plain HTTP (camp/offline mode) the secure
      # cookie flag has to be disabled, otherwise the browser refuses to
      # send the session cookie back and login silently fails.
      ALLOW_INSECURE_COOKIES: ${ALLOW_INSECURE_COOKIES:-0}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    # Gunicorn published directly so LAN clients can reach the app over
    # plain HTTP even with no internet and without going through Caddy.
    ports:
      - "8000:8000"
    volumes:
      - ./app/static:/app/app/static

  caddy:
    profiles: ["prod"]
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-:80}
      # Whole-line injection: empty means "automatic HTTPS on". Offline
      # deployments set CADDY_AUTO_HTTPS_LINE=auto_https off.
      CADDY_AUTO_HTTPS_LINE: ${CADDY_AUTO_HTTPS_LINE:-}
      # Whole-line injection: set to "tls /certs/<fullchain> /certs/<key>"
      # to serve a cert issued elsewhere (works behind NAT, no ACME here).
      CADDY_TLS_LINE: ${CADDY_TLS_LINE:-}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-admin@localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Pre-issued certs (static-cert mode); harmless empty dir otherwise.
      - ${CERTS_DIR:-./certs}:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
