# Deploy to production on every push to master.
#
# Runs on a self-hosted runner tagged `lluw` -- the runner lives on the
# production host and has Docker installed. The workflow:
#
#   1. Checks out the code into the runner workspace (keeps untracked
#      files like .env that the host provides).
#   2. Builds the web image, runs DB migrations, then brings the full
#      prod stack (db + web + caddy) up in place.
#
# The .env file must already exist in the workspace on the host --
# it is not checked into git.

name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, lluw]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Build web image
        run: docker compose --profile prod build web

      - name: Run database migrations
        run: docker compose --profile prod run --rm web flask db upgrade

      - name: Start / update stack
        run: docker compose --profile prod up -d --remove-orphans

      - name: Prune dangling images
        run: docker image prune -f
