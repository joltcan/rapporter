# Deploy to production on every push to master.
#
# Runs on a self-hosted runner tagged `production` -- the runner lives on
# the production host and has Docker installed. The workflow:
#
#   1. Checks out the code into the runner workspace (keeps untracked
#      files like .env that the host provides).
#   2. Builds the web image, runs DB migrations, then brings the full
#      prod stack (db + web + caddy) up in place.
#
# The .env file must already exist in the workspace on the host --
# it is not checked into git.

name: Deploy Windows

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-prod-windows
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, production, windows]
    environment: production
    defaults:
      run:
        # Windows runner: Windows PowerShell is always present. A bare
        # `bash` would resolve to the WSL stub in System32, which has no
        # distributions for the service account. ExecutionPolicy Bypass
        # because the box's policy is Restricted, which blocks the
        # runner's generated step scripts.
        shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          clean: false

      - name: Write .env from environment variable
        env:
          # Per-host env file; _HP = the hp-elitedesk Windows host.
          ENV_FILE: ${{ vars.ENVIRONMENT_HP }}
        # WriteAllText with BOM-less UTF-8 -- docker compose chokes on a BOM
        # before the first key, which Out-File would emit.
        run: '[IO.File]::WriteAllText("$env:GITHUB_WORKSPACE\.env", $env:ENV_FILE, (New-Object System.Text.UTF8Encoding($false)))'

      - name: Build web image
        # Self-hosted runner -- the local Docker daemon already caches
        # layers across runs, so there's no point shipping them to GHA
        # cache via buildx. docker/bake-action + type=gha previously
        # replayed a stale COPY . . layer, shipping an outdated image.
        run: docker compose -f docker-compose.yml --profile prod build --pull web

      - name: Run database migrations
        run: docker compose -f docker-compose.yml --profile prod run --rm web flask db upgrade

      - name: Start / update stack
        # --force-recreate guarantees the web container restarts against the
        # freshly-built image even if the digest happens to match the previous
        # one (e.g. when the buildx cache replayed every layer).
        run: docker compose -f docker-compose.yml --profile prod up -d --force-recreate --remove-orphans

      - name: Prune dangling images
        run: docker image prune -f
